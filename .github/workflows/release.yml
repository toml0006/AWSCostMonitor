name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
      
    - name: Get Version from Tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Import Code Signing Certificates
      if: github.repository_owner == 'toml0006'
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      continue-on-error: true
    
    - name: Build and Archive App
      run: |
        cd packages/app/AWSCostMonitor

        # Clean build folder
        xcodebuild clean -project AWSCostMonitor.xcodeproj -scheme AWSCostMonitor-OpenSource

        # Test compile to catch any Swift errors early (no signing needed)
        echo "Testing Swift compilation..."
        xcodebuild -project AWSCostMonitor.xcodeproj \
                   -scheme AWSCostMonitor-OpenSource \
                   -destination 'platform=macOS' \
                   -configuration Debug \
                   CODE_SIGNING_ALLOWED=NO \
                   OTHER_SWIFT_FLAGS="-D OPENSOURCE" \
                   build || exit 1

        # Archive WITHOUT signing. The project's Release config is wired for the
        # App Store ("3rd Party Mac Developer Application" + a "match AppStore"
        # provisioning profile); that profile is what failed every prior release,
        # and a manual profile also breaks the SwiftPM dependencies. So we skip
        # signing here and sign the finished .app ourselves below.
        xcodebuild -project AWSCostMonitor.xcodeproj \
                   -scheme AWSCostMonitor-OpenSource \
                   -destination 'platform=macOS' \
                   -configuration Release \
                   -archivePath ./AWSCostMonitor.xcarchive \
                   OTHER_SWIFT_FLAGS="-D OPENSOURCE" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   archive

        mkdir -p export
        cp -R "AWSCostMonitor.xcarchive/Products/Applications/AWSCostMonitor.app" export/

        # Sign the .app ourselves with the app's own entitlements, so App Sandbox
        # and the security-scoped bookmarks that grant ~/.aws access stay intact.
        # Prefer a Developer ID (notarizable, Gatekeeper-clean); fall back to
        # ad-hoc ("-") which still embeds the entitlements (sandbox preserved).
        ENTITLEMENTS="AWSCostMonitor/AWSCostMonitor.entitlements"
        if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
          SIGN_ID=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with Developer ID: $SIGN_ID"
        else
          SIGN_ID="-"
          echo "No Developer ID found; ad-hoc signing (sandbox entitlements preserved)"
        fi
        codesign --force --options runtime --deep \
                 --entitlements "$ENTITLEMENTS" \
                 --sign "$SIGN_ID" \
                 export/AWSCostMonitor.app

        echo "Signature:"
        codesign --verify --strict --verbose=2 export/AWSCostMonitor.app 2>&1 | tail -4 || true
        echo "Embedded entitlements:"
        codesign -d --entitlements :- export/AWSCostMonitor.app 2>/dev/null | grep -iE "sandbox|bookmark|network" || true
    
    - name: Notarize App
      if: github.repository_owner == 'toml0006' && success()
      run: |
        cd packages/app/AWSCostMonitor
        
        # Check if app is signed
        if codesign --verify --deep --strict ./export/AWSCostMonitor.app 2>/dev/null; then
          echo "App is signed, proceeding with notarization..."
          
          # Create zip for notarization
          ditto -c -k --keepParent ./export/AWSCostMonitor.app AWSCostMonitor-notarization.zip
          
          # Submit for notarization (if credentials are available)
          if [ -n "${{ secrets.APPLE_ID }}" ] && [ -n "${{ secrets.APP_PASSWORD }}" ] && [ -n "${{ secrets.TEAM_ID }}" ]; then
            xcrun notarytool submit AWSCostMonitor-notarization.zip \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --team-id "${{ secrets.TEAM_ID }}" \
              --password "${{ secrets.APP_PASSWORD }}" \
              --wait || echo "Notarization failed, continuing without it"
              
            # Staple the ticket if notarization succeeded
            xcrun stapler staple ./export/AWSCostMonitor.app || echo "Stapling failed, continuing without it"
          else
            echo "Notarization credentials not found, skipping notarization"
          fi
          
          rm -f AWSCostMonitor-notarization.zip
        else
          echo "App is not signed, skipping notarization"
        fi
      continue-on-error: true
    
    - name: Create DMG
      run: |
        cd packages/app/AWSCostMonitor
        
        # Create DMG staging directory
        mkdir dmg-staging
        cp -R export/AWSCostMonitor.app dmg-staging/
        ln -s /Applications dmg-staging/Applications
        
        # Create DMG with proper naming
        hdiutil create -volname "AWS Cost Monitor ${{ steps.version.outputs.VERSION }}" \
                      -srcfolder dmg-staging \
                      -ov -format UDZO \
                      "AWSCostMonitor-${{ steps.version.outputs.VERSION }}.dmg"
    
    - name: Create Zip Archive
      run: |
        cd packages/app/AWSCostMonitor/export
        zip -r "../AWSCostMonitor-${{ steps.version.outputs.VERSION }}.zip" AWSCostMonitor.app
    
    - name: Generate Release Notes
      id: notes
      run: |
        cat > release_notes.md << EOF
        # AWSCostMonitor ${{ steps.version.outputs.VERSION }} - Open Source Release
        
        ## 🎉 Open Source Build
        
        **This is the open source version of AWSCostMonitor with all features included for free!**
        
        ### What's Included:
        - ✅ **All Pro Features Free** - Team Cache, multi-profile support, and all display formats
        - ✅ **No In-App Purchases** - Everything is unlocked
        - ✅ **No Restrictions** - Full functionality without any limitations
        
        ## ✨ Key Features
        
        - **Real-time Cost Monitoring** - Always-visible MTD spending in your menu bar
        - **Multi-Profile Support** - Switch between unlimited AWS profiles
        - **Team Cache (S3)** - Share cost data with your team to reduce API calls by 90%
        - **Smart Refresh** - Budget-based refresh intervals to minimize API costs
        - **Cost Forecasting** - Predictive month-end projections
        - **Service Breakdown** - See costs by AWS service
        - **Calendar View** - Visual daily spending patterns
        - **Keyboard Shortcuts** - Quick access with ⌘K for calendar, ⌘R to refresh
        
        ## 🔧 Recent Improvements
        
        - Screen-aware refresh that pauses when display sleeps
        - User activity detection (5+ min idle)
        - Intelligent cache management
        - Comprehensive test coverage
        
        ## Installation
        
        ### Option 1: DMG Installer (Recommended)
        1. Download \`AWSCostMonitor-${{ steps.version.outputs.VERSION }}.dmg\`
        2. Open the DMG file
        3. Drag AWS Cost Monitor to Applications folder
        4. Launch from Applications
        
        ### Option 2: Zip Archive
        1. Download \`AWSCostMonitor-${{ steps.version.outputs.VERSION }}.zip\`
        2. Extract the zip file
        3. Move AWSCostMonitor.app to Applications folder
        4. Launch from Applications
        
        ## Requirements
        
        - macOS 13.0 (Ventura) or later
        - AWS CLI configured with profiles
        - Cost Explorer API permissions
        
        ## Security Note
        
        You'll see a macOS security dialog about opening an app downloaded from the internet. This is normal for apps not distributed through the Mac App Store. [Learn how to open it safely →](https://toml0006.github.io/AWSCostMonitor/#/unsigned-app-guide)
        
        ## Documentation
        
        Visit our [website](https://toml0006.github.io/AWSCostMonitor/) for installation guides and documentation.
        EOF
        
        echo "NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: AWS Cost Monitor ${{ steps.version.outputs.VERSION }}
        body_path: ${{ steps.notes.outputs.NOTES_FILE }}
        files: |
          packages/app/AWSCostMonitor/AWSCostMonitor-${{ steps.version.outputs.VERSION }}.dmg
          packages/app/AWSCostMonitor/AWSCostMonitor-${{ steps.version.outputs.VERSION }}.zip
        draft: false
        prerelease: false
        fail_on_unmatched_files: true